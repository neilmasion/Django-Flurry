{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Flurry</title>
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/root.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/reset_auth.css' %}">
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    
    <div class="container">
        <a href="{% url 'index' %}" class="back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-container">
            <div class="auth-header">
                <i class="fa-solid fa-paper-plane"></i>
                <h1>Check your inbox!</h1>
                <p>Registration successful! We've sent a verification link to your email. Please click the link to activate your account and log in.</p>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 1.5rem; text-align: center;">
                <a href="{% url 'account' %}?panel=login" class="premium-btn" style="text-decoration: none;">
                    Go to Login <i class="fa-solid fa-right-to-bracket"></i>
                </a>
                
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5);">
                    Didn't receive the email? Check your spam folder or wait a few minutes.
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="{% static 'js/main.js' %}"></script>
</body>
</html>
