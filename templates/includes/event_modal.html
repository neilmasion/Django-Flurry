<div class="admin-modal-overlay" id="eventDetailsModal" style="display: none; z-index: 10000;">
    <div class="admin-modal" style="max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;">
        <div class="admin-modal-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0;">
            <h2 id="modalEventTitle" style="margin: 0; color: var(--primary-color); font-size: 1.5rem; line-height: 1.3;">Event Title</h2>
            <button id="closeEventModalIcon" style="background: none; border: none; font-size: 1.25rem; color: var(--text-tertiary); cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="color: var(--text-primary); margin-bottom: 1rem; overflow-y: auto; flex-grow: 1; padding-right: 0.5rem; display: flex; flex-direction: column;">
            <div style="display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; background: var(--bg-tertiary); padding: 1rem; border-radius: var(--radius-md);">
                <span style="font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;"><i class="fa-regular fa-calendar"></i> <span id="modalEventDate"></span></span>
                <span style="font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;"><i class="fa-regular fa-clock"></i> <span id="modalEventTime"></span></span>
                <span style="font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;"><i class="fa-solid fa-location-dot"></i> <span id="modalEventLocation"></span></span>
            </div>
            <div id="modalEventDescription" style="line-height: 1.7; font-size: 0.95rem; color: var(--text-secondary);">
                 Description goes here...
            </div>
        </div>
        <div class="admin-modal-actions" style="display: flex; justify-content: flex-end; border-top: 1px solid var(--border-color); padding-top: 1rem; flex-shrink: 0;">
            <button class="btn btn-outline" id="closeEventModalBtn">Close Details</button>
        </div>
    </div>
</div>
