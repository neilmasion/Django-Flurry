{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flurry | Reset Password</title>
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/root.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/reset_auth.css' %}">
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    
    <div class="container">
        <a href="{% url 'login' %}" class="back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>
        
        <div class="auth-container">
            <div class="auth-header">
                <i class="fa-solid fa-key"></i>
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you instructions to reset your password.</p>
            </div>
            
            <form method="post" class="demo-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">Email Address</label>
                    <input type="email" name="email" id="id_email" placeholder="example@email.com" required>
                </div>
                <button type="submit" class="premium-btn btn-block">
                    Send Reset Link <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="{% static 'js/main.js' %}?v=nuclear"></script>
</body>
</html>
