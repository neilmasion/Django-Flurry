{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flurry | Success</title>
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/root.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/reset_auth.css' %}">
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    
    <div class="container">
        <div class="auth-container" style="text-align: center;">
            <div class="auth-header">
                <i class="fa-solid fa-circle-check" style="color: #4ade80;"></i>
                <h1>Password Reset</h1>
                <p>Success! Your password has been updated. You can now log in with your new credentials.</p>
            </div>
            
            <a href="{% url 'login' %}" class="premium-btn btn-block">
                Login Now <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </a>
        </div>
    </div>

    <script type="module" src="{% static 'js/main.js' %}"></script>
</body>
</html>
