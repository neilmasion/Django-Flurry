{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flurry | Email Sent</title>
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/root.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/reset_auth.css' %}">
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    
    <div class="container">
        <div class="auth-container">
            <div class="auth-header" style="margin-bottom: 2rem;">
                <i class="fa-solid fa-paper-plane" style="color: #4ade80;"></i>
                <h1>Check Your Email</h1>
                <p>We've sent recovery instructions to your email address. Please check your inbox and follow the link.</p>
            </div>
            
            <p style="text-align: center; color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 2rem;">
                Don't see it? Check your spam folder or wait a few minutes.
            </p>
            
            <a href="{% url 'login' %}" class="premium-btn btn-block">
                Return to Login
            </a>
        </div>
    </div>

    <script type="module" src="{% static 'js/main.js' %}"></script>
</body>
</html>
